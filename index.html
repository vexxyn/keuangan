<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemantau Keuangan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">

  <header class="header">
    <div>
      <div class="eyebrow">Buku Kas Pribadi</div>
      <h1 class="title">Pemantau Keuangan</h1>
    </div>
    <div class="wallet-badge">💰</div>
  </header>

  <section class="saldo-card">
    <div class="saldo-label">Saldo Total</div>
    <div class="saldo-number" id="saldo-total">Rp 0</div>
  </section>

  <div class="month-nav">
    <button id="btn-prev" class="nav-btn" aria-label="Bulan sebelumnya">&#8249;</button>
    <span class="month-label" id="month-label"></span>
    <button id="btn-next" class="nav-btn" aria-label="Bulan berikutnya">&#8250;</button>
  </div>

  <div class="stat-row">
    <div class="stat-card">
      <div class="stat-top stat-in">▲ Pemasukan</div>
      <div class="stat-number" id="total-masuk">Rp 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-top stat-out">▼ Pengeluaran</div>
      <div class="stat-number" id="total-keluar">Rp 0</div>
    </div>
  </div>
  <div class="balance-line">Selisih bulan ini: <span id="selisih-bulan">Rp 0</span></div>

  <form class="card" id="form-transaksi">
    <div class="card-title">Catat Transaksi</div>

    <div class="toggle-row">
      <button type="button" class="toggle-btn active-out" id="btn-keluar" data-tipe="keluar">Pengeluaran</button>
      <button type="button" class="toggle-btn" id="btn-masuk" data-tipe="masuk">Pemasukan</button>
    </div>

    <div class="field-row">
      <div style="flex:1">
        <label class="label">Jumlah (Rp)</label>
        <input type="number" min="0" inputmode="numeric" id="input-jumlah" placeholder="50000" class="input">
      </div>
      <div style="flex:1">
        <label class="label">Tanggal</label>
        <input type="date" id="input-tanggal" class="input">
      </div>
    </div>

    <label class="label">Kategori</label>
    <div class="kat-grid" id="kat-grid"></div>

    <label class="label">Catatan (opsional)</label>
    <input type="text" id="input-catatan" placeholder="cth. makan siang tim" class="input">

    <div class="error-text" id="error-text"></div>

    <button type="submit" class="submit-btn">+ Tambah Transaksi</button>
  </form>

  <section class="card" id="chart-card" style="display:none;">
    <div class="card-title">Pengeluaran per Kategori</div>
    <div class="chart-row">
      <svg id="donut-chart" viewBox="0 0 120 120" width="140" height="140"></svg>
      <div class="legend" id="legend"></div>
    </div>
  </section>

  <section class="card">
    <div class="card-title">Riwayat Transaksi <span class="count" id="riwayat-count"></span></div>
    <div id="empty-state" class="empty">Belum ada transaksi di bulan ini.</div>
    <div id="riwayat-list"></div>
  </section>

  <div class="foot-note">Data disimpan otomatis di browser ini.</div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
